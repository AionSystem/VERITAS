<div class="toast-container" id="toastContainer"></div>

<script>
// ... your existing JavaScript (all of it) ...

// ============================================================
// STP INTEGRATION – Sovereign Trace Protocol (added at the end)
// ============================================================

let currentSTPSeal = null;  // Stores the latest seal object

async function stampWithSTP() {
  const reports = await dbGetAll();
  if (reports.length === 0) {
    toast('No reports to seal');
    return;
  }

  // Prepare dataset summary and compute its SHA‑256
  const clean = reports.map(r => ({
    uuid: r.uuid,
    timestamp: r.timestamp,
    lat: r.lat,
    lng: r.lng,
    tier: r.tier,
    infra: r.infraType,
    dci: r.dci,
    dci_tier: r.dciTier
  }));
  const datasetStr = JSON.stringify(clean, null, 2);
  const datasetHash = await computeHash(datasetStr);

  const timestamp = new Date().toISOString();
  const entry = `VERITAS Export
Timestamp: ${timestamp}
Reports: ${reports.length}
Dataset SHA-256: ${datasetHash}
Powered by CERTUS Engine v1.0
STP integrity seal requested via AionSystem/VERITAS`;

  const btn = document.getElementById('stpSealBtn');
  const originalText = btn.textContent;
  btn.textContent = 'Sealing...';
  btn.disabled = true;

  try {
    const response = await fetch('https://aion-backend-mu.vercel.app/api/stp-seal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        entry: entry,
        type: '07',          // GENERAL-TRACE template
        sessionId: 'veritas-export-' + timestamp,
        userId: null
      })
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const seal = await response.json();
    if (!seal.success) throw new Error(seal.error || 'Seal failed');

    currentSTPSeal = {
      ...seal,
      datasetHash,
      reportsCount: reports.length,
      exportTimestamp: timestamp
    };
    displaySTPSeal(currentSTPSeal);
    toast('STP seal created successfully');
  } catch (err) {
    console.error('STP seal error:', err);
    toast(`STP seal failed: ${err.message}`);
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

function displaySTPSeal(seal) {
  const displayDiv = document.getElementById('stpSealDisplay');
  const contentDiv = document.getElementById('stpSealContent');
  displayDiv.style.display = 'block';
  contentDiv.innerHTML = `
    <div><strong>Seal ID:</strong> ${seal.ledger_file || '—'}</div>
    <div><strong>SHA-256:</strong> <code>${seal.seal}</code></div>
    <div><strong>📅 Gregorian:</strong> ${seal.gregorian}</div>
    <div><strong>🌑 Hebrew:</strong> ${seal.hebrew}</div>
    <div><strong>🌀 Dreamspell:</strong> ${seal.dreamspell}</div>
    <div><strong>📦 Dataset SHA-256:</strong> <code>${seal.datasetHash}</code></div>
    <div><strong>Reports sealed:</strong> ${seal.reportsCount}</div>
    <div><strong>Issue URL:</strong> <a href="${seal.issue_url}" target="_blank">${seal.issue_url || '—'}</a></div>
    <div><small>This seal proves the dataset existed at this triple‑time moment and has not been altered since sealing. Verify with STP code.</small></div>
  `;
}

function downloadSTPSeal() {
  if (!currentSTPSeal) return;
  const filename = `veritas-stp-seal-${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
  const content = JSON.stringify(currentSTPSeal, null, 2);
  download(content, filename, 'application/json');
  toast('STP seal file downloaded');
}

// Optionally update export preview to show if a seal exists (modified existing function)
// We'll override updateExportPreview to include STP note if seal exists.
const originalUpdateExportPreview = updateExportPreview;
updateExportPreview = async function(reports) {
  await originalUpdateExportPreview(reports);  // call the original to set basic preview
  if (currentSTPSeal) {
    const previewEl = document.getElementById('exportPreview');
    const stpNote = `\n\nSTP SEAL: ${currentSTPSeal.seal}\nSTP Timestamp: ${currentSTPSeal.gregorian}\nSTP Triple-Time: ${currentSTPSeal.hebrew} | ${currentSTPSeal.dreamspell}`;
    previewEl.textContent = previewEl.textContent + stpNote;
  }
};

</script>
